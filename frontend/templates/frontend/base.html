<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dataset Manager{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-56 min-h-screen bg-white border-r border-gray-200 flex flex-col fixed top-0 left-0">
        <div class="px-5 py-4 border-b border-gray-200">
            <span class="font-semibold text-gray-800">Dataset Manager</span>
        </div>
        <nav class="flex-1 px-3 py-3 space-y-1">
            <a href="/dashboard" class="flex items-center gap-2 px-3 py-2 rounded text-sm text-gray-600 hover:bg-gray-100 {% block nav_dashboard %}{% endblock %}">Dashboard</a>
            <a href="/datasets" class="flex items-center gap-2 px-3 py-2 rounded text-sm text-gray-600 hover:bg-gray-100 {% block nav_datasets %}{% endblock %}">Datasets</a>
            <a href="/categories" class="flex items-center gap-2 px-3 py-2 rounded text-sm text-gray-600 hover:bg-gray-100 {% block nav_categories %}{% endblock %}">Categorias</a>
            <a href="/profile" class="flex items-center gap-2 px-3 py-2 rounded text-sm text-gray-600 hover:bg-gray-100 {% block nav_profile %}{% endblock %}">Perfil</a>
        </nav>
        <div class="px-5 py-4 border-t border-gray-200 text-sm text-gray-500">
            {{ request.user.username|default:"Utilizador" }}
        </div>
    </aside>

    <!-- Conteúdo -->
    <div class="flex-1 flex flex-col ml-56">
        <header class="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-6">
            <h1 class="text-sm font-semibold text-gray-800">{% block page_title %}{% endblock %}</h1>
            <div class="flex items-center gap-2">
                {% block navbar_actions %}{% endblock %}
            </div>
        </header>
        <main class="flex-1 p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-lg border border-gray-200 w-full max-w-sm p-8">
        <h1 class="text-lg font-semibold text-gray-800 mb-6">Criar conta</h1>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-xs text-gray-500 mb-1">Nome de utilizador</label>
                <input type="text" name="username" class="w-full text-sm border border-gray-200 rounded px-3 py-2 focus:outline-none focus:border-blue-400" placeholder="o teu nome">
            </div>
            <div class="mb-4">
                <label class="block text-xs text-gray-500 mb-1">Email</label>
                <input type="email" name="email" class="w-full text-sm border border-gray-200 rounded px-3 py-2 focus:outline-none focus:border-blue-400" placeholder="email@exemplo.com">
            </div>
            <div class="mb-6">
                <label class="block text-xs text-gray-500 mb-1">Password</label>
                <input type="password" name="password" class="w-full text-sm border border-gray-200 rounded px-3 py-2 focus:outline-none focus:border-blue-400" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white text-sm py-2 rounded hover:bg-blue-700">
                Criar conta
            </button>
        </form>

        <p class="text-xs text-center text-gray-400 mt-4">
            Já tens conta? <a href="/login" class="text-blue-600 hover:underline">Entra aqui</a>
        </p>
    </div>

</body>
</html>

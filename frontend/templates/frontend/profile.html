{% extends "frontend/base.html" %}

{% block title %}Perfil{% endblock %}
{% block page_title %}Perfil{% endblock %}
{% block nav_profile %}bg-gray-100 font-medium text-gray-900{% endblock %}

{% block content %}

<div class="max-w-xl">
    <div class="bg-white rounded-lg border border-gray-200 p-6 mb-4">
        <h2 class="text-sm font-semibold text-gray-700 mb-4">Informação pessoal</h2>

        <div class="mb-4">
            <label class="block text-xs text-gray-500 mb-1">Nome de utilizador</label>
            <input type="text" value="{{ request.user.username }}" class="w-full text-sm border border-gray-200 rounded px-3 py-2 focus:outline-none focus:border-blue-400">
        </div>

        <div class="mb-4">
            <label class="block text-xs text-gray-500 mb-1">Email</label>
            <input type="email" value="{{ request.user.email }}" class="w-full text-sm border border-gray-200 rounded px-3 py-2 focus:outline-none focus:border-blue-400">
        </div>

        <div class="mb-4">
            <label class="block text-xs text-gray-500 mb-1">Nome</label>
            <input type="text" value="{{ request.user.first_name }}" class="w-full text-sm border border-gray-200 rounded px-3 py-2 focus:outline-none focus:border-blue-400">
        </div>

        <div class="mb-6">
            <label class="block text-xs text-gray-500 mb-1">Apelido</label>
            <input type="text" value="{{ request.user.last_name }}" class="w-full text-sm border border-gray-200 rounded px-3 py-2 focus:outline-none focus:border-blue-400">
        </div>

        <button class="bg-blue-600 text-white text-sm px-4 py-2 rounded hover:bg-blue-700">
            Guardar alterações
        </button>
    </div>

    <div class="bg-white rounded-lg border border-gray-200 p-6">
        <h2 class="text-sm font-semibold text-gray-700 mb-4">Alterar password</h2>

        <div class="mb-4">
            <label class="block text-xs text-gray-500 mb-1">Password atual</label>
            <input type="password" class="w-full text-sm border border-gray-200 rounded px-3 py-2 focus:outline-none focus:border-blue-400">
        </div>

        <div class="mb-4">
            <label class="block text-xs text-gray-500 mb-1">Nova password</label>
            <input type="password" class="w-full text-sm border border-gray-200 rounded px-3 py-2 focus:outline-none focus:border-blue-400">
        </div>

        <div class="mb-6">
            <label class="block text-xs text-gray-500 mb-1">Confirmar nova password</label>
            <input type="password" class="w-full text-sm border border-gray-200 rounded px-3 py-2 focus:outline-none focus:border-blue-400">
        </div>

        <button class="bg-blue-600 text-white text-sm px-4 py-2 rounded hover:bg-blue-700">
            Alterar password
        </button>
    </div>
</div>

{% endblock %}
